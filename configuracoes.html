<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSTRUBRAX - Configurações</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header class="top-bar">
        <div class="logo-empresa">
            <img src="home.png" alt="Logo CONSTRUBRAX">
            <span class="nome-empresa">CONSTRUBRAX</span>
        </div>
        <div class="usuario-info">
            <span id="user-name">KELERMANN</span>
            <button id="home-button"><i class="fas fa-home"></i></button>
            <button id="settings-button"><i class="fas fa-cog"></i></button>
            <button id="logoff-button"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>
    <nav class="sidebar">
        <!-- Menu lateral já incluído em TelaInicial.html -->
    </nav>
    <main class="content">
        <h1>Configurações</h1>
        <form>
            <div class="input-group">
                <label for="config1">Configuração 1:</label>
                <input type="text" id="config1" placeholder="Valor">
            </div>
            <div class="input-group">
                <label for="config2">Configuração 2:</label>
                <input type="text" id="config2" placeholder="Valor">
            </div>
            <div class="input-group">
                <label for="config3">Configuração 3:</label>
                <input type="text" id="config3" placeholder="Valor">
            </div>
            <button type="submit">Salvar Configurações</button>
        </form>
    </main>
    <footer>
        <p>© 2025 IKATECH. Todos os direitos reservados.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
