<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSTRUBRAX - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header class="top-bar">
        <div class="logo-empresa">
            <img src="home.png" alt="Logo CONSTRUBRAX">
            <span class="nome-empresa">CONSTRUBRAX</span>
        </div>
        <div class="usuario-info">
            <span id="user-name">KELERMANN</span>
            <button id="home-button"><i class="fas fa-home"></i></button>
            <button id="settings-button"><i class="fas fa-cog"></i></button>
            <button id="logoff-button"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>
    <nav class="sidebar">
        <!-- Menu lateral já incluído em TelaInicial.html -->
    </nav>
    <main class="content">
        <h1>DASHBOARD</h1>
        <div class="filter-group">
            <div class="client-filter">
                <label for="client-filter">Cliente:</label>
                <select id="client-filter">
                    <option value="todos">Todos</option>
                    <option value="cliente1">Cliente 1</option>
                    <option value="cliente2">Cliente 2</option>
                    <option value="cliente3">Cliente 3</option>
                </select>
            </div>
            <div class="date-filter">
                <label for="start-date">De:</label>
                <input type="date" id="start-date">
                <label for="end-date">Até:</label>
                <input type="date" id="end-date">
                <button class="filter-btn">Filtrar</button>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="dashboard-card">
                <h3>Total de Clientes</h3>
                <p>150</p>
            </div>
            <div class="dashboard-card">
                <h3>Total de Empréstimos</h3>
                <p>85</p>
            </div>
            <div class="dashboard-card">
                <h3>Total de Pagamentos</h3>
                <p>200</p>
            </div>
            <div class="dashboard-card">
                <h3>Clientes em Atraso</h3>
                <p>10</p>
            </div>
        </div>
    </main>
    <footer>
        <p>© 2025 IKATECH. Todos os direitos reservados.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
