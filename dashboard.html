<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard - Sistema</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="scripts.js"></script>
</head>
<body>

    <!-- Sidebar -->
    <nav class="sidebar" aria-label="Menu Principal">
        <h2>Menu</h2>
        <ul>
            <li><a href="#" class="active" data-icon="🏠"><i class="fa fa-home"></i> Início</a></li>
            <li><a href="#" data-icon="📄"><i class="fa fa-file-alt"></i> Relatórios</a></li>
            <li><a href="#" data-icon="⚙️"><i class="fa fa-cogs"></i> Configurações</a></li>
            <li><a href="#" data-icon="❓"><i class="fa fa-question-circle"></i> Ajuda</a></li>
            <li><a href="#" data-icon="🚪" id="logout-btn"><i class="fa fa-sign-out-alt"></i> Sair</a></li>
        </ul>
    </nav>

    <!-- Topbar -->
    <header class="top-bar" role="banner">
        <div class="logo-empresa">
            <img src="logo.png" alt="Logo Empresa" />
            <div class="nome-empresa">Minha Empresa</div>
        </div>
        <div class="usuario-info" aria-label="Informações do usuário">
            <span id="usuario-nome">Olá, Usuário</span>
            <button id="btn-perfil" title="Perfil"><i class="fa fa-user-circle"></i></button>
            <button id="btn-sair" title="Sair"><i class="fa fa-sign-out-alt"></i></button>
        </div>
    </header>

    <!-- Conteúdo principal -->
    <main class="content" role="main" tabindex="-1">
        <div class="header">
            <h1>Dashboard</h1>
            <div class="filter-options">
                <div class="client-filter">
                    <label for="select-client">Cliente:</label>
                    <select id="select-client" name="client">
                        <option value="">Todos</option>
                        <option value="cliente1">Cliente 1</option>
                        <option value="cliente2">Cliente 2</option>
                    </select>
                </div>
                <div class="date-filter">
                    <label for="filter-date">Data:</label>
                    <input type="date" id="filter-date" name="date" />
                </div>
                <button class="filter-btn" id="btn-filter"><i class="fa fa-filter"></i> Filtrar</button>
            </div>
        </div>

        <!-- Cards de resumo -->
        <section class="summary-cards" aria-label="Resumo de informações">
            <article class="card" id="card1">
                <h2>Vendas</h2>
                <p>R$ 10.000</p>
            </article>
            <article class="card" id="card2">
                <h2>Clientes</h2>
                <p>250</p>
            </article>
            <article class="card" id="card3">
                <h2>Novos Pedidos</h2>
                <p>45</p>
            </article>
        </section>

        <!-- Tabela de dados -->
        <section aria-label="Tabela de dados">
            <table class="data-table" id="data-table">
                <thead>
                    <tr>
                        <th>Pedido</th>
                        <th>Cliente</th>
                        <th>Data</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr data-client="cliente1" data-date="2025-06-01">
                        <td>001</td>
                        <td>Cliente 1</td>
                        <td>01/06/2025</td>
                        <td>Concluído</td>
                        <td>
                            <button class="btn-action btn-edit" title="Editar"><i class="fa fa-edit"></i></button>
                            <button class="btn-action btn-delete" title="Excluir"><i class="fa fa-trash-alt"></i></button>
                        </td>
                    </tr>
                    <tr data-client="cliente2" data-date="2025-06-02">
                        <td>002</td>
                        <td>Cliente 2</td>
                        <td>02/06/2025</td>
                        <td>Pendente</td>
                        <td>
                            <button class="btn-action btn-edit" title="Editar"><i class="fa fa-edit"></i></button>
                            <button class="btn-action btn-delete" title="Excluir"><i class="fa fa-trash-alt"></i></button>
                        </td>
                    </tr>
                    <tr data-client="cliente1" data-date="2025-06-03">
                        <td>003</td>
                        <td>Cliente 1</td>
                        <td>03/06/2025</td>
                        <td>Concluído</td>
                        <td>
                            <button class="btn-action btn-edit" title="Editar"><i class="fa fa-edit"></i></button>
                            <button class="btn-action btn-delete" title="Excluir"><i class="fa fa-trash-alt"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- FontAwesome CDN para os ícones -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
