<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSTRUBRAX - Alterar Senha</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header class="top-bar">
        <div class="logo-empresa">
            <img src="home.png" alt="Logo CONSTRUBRAX">
            <span class="nome-empresa">CONSTRUBRAX</span>
        </div>
        <div class="usuario-info">
            <span id="user-name">KELERMANN</span>
            <button id="home-button"><i class="fas fa-home"></i></button>
            <button id="settings-button"><i class="fas fa-cog"></i></button>
            <button id="logoff-button"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>
    <nav class="sidebar">
        <!-- Menu lateral já incluído em TelaInicial.html -->
    </nav>
    <main class="content">
        <div class="change-password-container">
            <h2>Alterar Senha</h2>
            <form id="change-password-form">
                <div class="input-group">
                    <input type="password" id="current-password" name="currentPassword" placeholder="Senha Atual" required>
                </div>
                <div class="input-group">
                    <input type="password" id="new-password" name="newPassword" placeholder="Nova Senha" required>
                </div>
                <button type="submit">Alterar Senha</button>
                <div id="change-password-message"></div>
            </form>
        </div>
    </main>
    <footer>
        <p>© 2025 CONSTRUBRAX. Todos os direitos reservados.</p>
    </footer>
    <script src="scripts.js"></script>
    <script>
        document.getElementById('change-password-form').addEventListener('submit', function(event) {
            event.preventDefault();
            document.getElementById('change-password-message').textContent = 'Senha alterada com sucesso (simulação).';
            document.getElementById('change-password-message').style.color = 'green';
        });
    </script>
</body>
</html>
