<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Sistema</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="scripts.js"></script>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="logo-title-container">
            <div class="logo">
                <img src="logo.png" alt="Logo Empresa" />
            </div>
            <h1>Bem-vindo</h1>
        </div>
        <form id="login-form">
            <div id="error-message" style="color: red; margin-bottom: 15px; display: none;"></div>

            <div class="input-container">
                <i class="fa fa-user"></i>
                <input type="text" id="username" placeholder="Usuário" required autocomplete="username" />
            </div>

            <div class="input-container">
                <i class="fa fa-lock"></i>
                <input type="password" id="password" placeholder="Senha" required autocomplete="current-password" />
            </div>

            <button type="submit">Entrar</button>
        </form>
    </div>

    <!-- FontAwesome CDN para os ícones -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
